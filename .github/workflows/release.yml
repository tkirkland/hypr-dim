name: Release

# Build release binaries and attach them to a GitHub Release whenever a
# version tag (vX.Y.Z) is pushed. Linux only — hypr-dim is a Wayland/D-Bus
# daemon and does not build for Windows or macOS.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Force node20-targeted actions (checkout, etc.) onto the node24 runtime so
# they stop emitting the node20 deprecation warning.
env:
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24

jobs:
  # Create the Release first; the upload matrix below attaches assets to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" \
                 --title "${GITHUB_REF_NAME}" \
                 --generate-notes \
                 --verify-tag

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 builds on the x86 runner (musl via cross).
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          # aarch64-gnu builds NATIVELY on an arm64 runner — the cross image's
          # old glibc lacks memfd_create (needed by shmemfdrs2). musl has it,
          # so aarch64-musl still cross-compiles fine on x86.
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest }
    steps:
      - uses: actions/checkout@v4

      # Builds with cross for non-native targets, produces a .tar.gz named
      # hypr-dim-<tag>-<target> plus a sha256, and uploads both to the Release.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: hypr-dim
          target: ${{ matrix.target }}
          archive: hypr-dim-$tag-$target
          checksum: sha256
          locked: true
          token: ${{ secrets.GITHUB_TOKEN }}
