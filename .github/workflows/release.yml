name: Release

# Build release binaries and attach them to a GitHub Release whenever a
# version tag (vX.Y.Z) is pushed. Linux only — hypr-dim is a Wayland/D-Bus
# daemon and does not build for Windows or macOS.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      # Builds with cross for non-native targets, produces a .tar.gz named
      # hypr-dim-<tag>-<target>, generates a sha256, and uploads it to the
      # Release for the pushed tag (creating it if needed; matrix-safe).
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: hypr-dim
          target: ${{ matrix.target }}
          archive: hypr-dim-$tag-$target
          checksum: sha256
          locked: true
          token: ${{ secrets.GITHUB_TOKEN }}
